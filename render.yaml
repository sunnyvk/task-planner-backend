services:
  - type: web
    name: task-planner-backend
    env: java
    region: singapore
    plan: free
    buildCommand: chmod +x ./mvnw && ./mvnw clean install -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/*.jar
    healthCheckPath: /api/users/signin
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        value: mySecretKeyForTaskPlannerProduction2026VeryLongAndSecure
      - key: OPENAI_API_KEY
        value: ""
      - key: EMAIL_USERNAME
        value: khambayatsunny278@gmail.com
      - key: EMAIL_PASSWORD
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: task-planner-db
    plan: free
    databaseName: taskplanner
    user: taskplanner